<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FFE Keynote Manager</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
      defer
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="db_manager.js" defer></script>
    <script src="site.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="title-card">
        <div class="brand-copy">
          <p class="eyebrow">FFE-PYREVIT v1.13.1</p>
          <h1>KEYNOTE MANAGER v0.11</h1>
          <p class="meta-line">
            <span id="doc-title">Waiting for Revit document</span>
            <span id="dirty-state" data-dirty="false">NO CHANGES</span>
          </p>
        </div>

        <div class="window-actions" aria-label="Window actions">
          <button
            id="configure-supabase"
            class="utility-button"
            type="button"
            data-bs-toggle="tooltip"
            data-bs-placement="top"
            title="Configure Supabase connection settings"
          >
            Config
          </button>
          <button
            id="refresh-data"
            class="utility-button"
            type="button"
            data-bs-toggle="tooltip"
            data-bs-placement="top"
            title="Refresh data from Keynote file"
          >
            Refresh
          </button>
          <button
            id="collect-analytics"
            class="utility-button"
            type="button"
            data-bs-toggle="tooltip"
            data-bs-placement="top"
            title="Collect keynote placement analytics and sync to Supabase"
          >
            Collect Analytics
          </button>
          <button
            id="save-data"
            class="save-button"
            type="button"
            data-bs-toggle="tooltip"
            data-bs-placement="top"
            title="Save data to Keynote file"
            disabled
          >
            Save
          </button>
          <button id="close-window" class="utility-button" type="button">Close</button>
        </div>
      </header>

      <section id="state-banner" class="message-strip" data-tone="idle">
        <div class="message-copy">
          <strong id="state-title">&lt;Messages&gt;</strong>
          <span id="state-message"></span>
        </div>
        <button
          id="warning-pill"
          class="warning-pill"
          type="button"
          data-severity="none"
          aria-label="Show warnings"
          aria-controls="validation-panel"
          aria-expanded="false"
          aria-pressed="false"
        >
          <span>Warnings</span>
          <span id="validation-summary" class="warning-count">0</span>
        </button>
      </section>

      <section class="file-strip" aria-label="Keynote file details">
        <span id="keynote-path">No keynote file loaded</span>
        <span id="encoding-label">-</span>
        <span><strong id="entry-count">0</strong> entries</span>
      </section>

      <div class="action-row" aria-label="Keynote row actions">
        <button id="add-root" class="btn btn-outline-dark action-button" type="button">Add Parent</button>
        <button id="add-sequence" class="btn btn-outline-dark action-button" type="button" disabled>Add Note in Sequence</button>
        <button id="add-sub-note" class="btn btn-outline-dark action-button" type="button" disabled>Add Sub-Note</button>
        <button id="duplicate-row" class="btn btn-primary action-button" type="button" disabled>Duplicate</button>
        <button id="delete-row" class="btn btn-danger action-button" type="button" disabled>Delete</button>
      </div>

      <main class="workspace">
        <aside class="division-panel" aria-labelledby="division-list-title">
          <div class="division-heading">
            <div>
              <h2 id="division-list-title">DIVISIONS</h2>
              <p id="filter-summary">0 divisions</p>
            </div>
            <button
              id="toggle-divisions"
              class="sidebar-toggle division-sidebar-toggle"
              type="button"
              aria-label="Collapse divisions"
              aria-controls="keynotes-section-body"
              aria-expanded="true"
              title="Collapse divisions"
            >
              <span aria-hidden="true">&lt;</span>
            </button>
          </div>

          <div id="keynotes-section-body">
            <div class="division-list-wrap">
              <div
                id="division-list"
                class="list-group list-group-flush division-list"
                role="listbox"
                aria-label="Division list"
              >
                <div class="empty-cell">Waiting for keynote data...</div>
              </div>
            </div>
          </div>
        </aside>

        <section class="notes-panel" aria-labelledby="notes-title">
          <div class="placement-toolbar" aria-label="Keynote placement settings">
            <label class="search-field toolbar-search-field" for="search-input">
              <span>Search</span>
              <input id="search-input" type="search" placeholder="Key, description, or parent" />
            </label>
            <label class="placement-mode-field" for="placement-mode-select">
              <span>Place As</span>
              <select id="placement-mode-select" class="form-select form-select-sm">
                <option value="userKeynote" selected>User Keynote</option>
                <option value="genericAnnotation">Generic Annotation</option>
              </select>
            </label>
          </div>

          <div class="selected-division-card">
            <div class="dropdown division-select">
              <button
                id="division-select-toggle"
                class="btn btn-lg dropdown-toggle division-select-toggle"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
                aria-label="Select division"
              >
                <span class="visually-hidden">Select division</span>
              </button>
              <ul
                id="division-select-menu"
                class="dropdown-menu division-select-menu"
                aria-labelledby="division-select-toggle"
              ></ul>
            </div>
            <label class="division-key-field" for="division-key-input">
              <span class="sr-only">Division key</span>
              <input id="division-key-input" type="text" autocomplete="off" disabled />
            </label>
            <label class="division-text-field" for="division-text-input">
              <span class="sr-only">Division description</span>
              <input id="division-text-input" type="text" autocomplete="off" disabled />
            </label>
          </div>

          <div id="notes-section-body" class="table-responsive note-table-shell">
            <table class="table table-sm table-hover align-middle mb-0 note-table" aria-label="Keynote notes">
              <colgroup>
                <col class="note-action-col" />
                <col class="note-key-col" />
                <col />
              </colgroup>
              <thead id="notes-title" class="note-table-header">
                <tr>
                  <th scope="col" aria-label="Place user keynote"></th>
                  <th scope="col">Key</th>
                  <th scope="col">Description</th>
                </tr>
              </thead>
              <tbody id="keynote-table-body" class="note-table-body">
                <tr>
                  <td class="empty-cell" colspan="3">Waiting for keynote data...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <aside
          id="validation-panel"
          class="validation-panel"
          aria-labelledby="validation-heading"
          hidden
        >
          <div class="validation-heading">
            <h2 id="validation-heading">Warnings</h2>
            <button
              id="close-validation-sidebar"
              class="sidebar-toggle validation-close"
              type="button"
              aria-label="Close warnings"
              title="Close warnings"
            >
              <span aria-hidden="true">x</span>
            </button>
          </div>
          <div id="validation-list" class="validation-list">
            <div class="empty-state">No validation messages.</div>
          </div>
        </aside>
      </main>
    </div>
  </body>
</html>
